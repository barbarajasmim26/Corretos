services:
  - type: web
    name: corretos-mesquita
    runtime: node
    plan: starter
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
    routes:
      - path: /
        destination: /
